name: CI

on:
  push:
    branches: [master, main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile and test
        run: npm test

      - name: Strict TypeScript sanity check
        run: npx tsc --noEmit --noUnusedLocals --noUnusedParameters --noImplicitReturns

      - name: Dependency audit
        run: npm audit --audit-level=high

      - name: Integration smoke test
        run: xvfb-run -a npm run test:integration

      - name: Package VSIX
        run: npm run package

  cross-platform:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile and test
        run: npm test

      - name: Strict TypeScript sanity check
        run: npx tsc --noEmit --noUnusedLocals --noUnusedParameters --noImplicitReturns
